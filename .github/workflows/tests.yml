name: Rocky Test Suite

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rocky-backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: rocky-backend
        run: |
          mkdir -p run-test/logs
          python -m unittest discover -s run-test/backend -p "test_*.py" -v | tee run-test/logs/backend-tests.log

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: run-test/logs/backend-tests.log

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rocky-interface/package-lock.json

      - name: Install frontend dependencies
        working-directory: rocky-interface
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install browser test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium

      - name: Run frontend browser tests
        env:
          PUBLIC_APP_ENV: testing
          PUBLIC_API_BASE_URL: http://127.0.0.1:5001
          PUBLIC_USE_LOCAL_API: "true"
          PUBLIC_ENABLE_DBTEST: "false"
        run: |
          mkdir -p run-test/logs
          python -m unittest discover -s run-test/frontend -p "test_*.py" -v | tee run-test/logs/frontend-tests.log

      - name: Upload frontend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-log
          path: run-test/logs/frontend-tests.log
