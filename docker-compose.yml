name: rocky

services:
  backend:
    build:
      context: .
      dockerfile: rocky-backend/Dockerfile
    environment:
      ROCKY_ENABLE_DB_INSPECTOR: "false"
    volumes:
      - backend-data:/app/rocky-backend/.mongita
    networks:
      - rocky-network


  frontend:
    build:
      context: .
      dockerfile: rocky-interface/Dockerfile
      args:
        APP_ENV: ${APP_ENV:-production}
    ports:
      - "3000:4173"
    networks:
      - rocky-network
  

networks:
  rocky-network:
    driver: bridge

volumes:
  backend-data: